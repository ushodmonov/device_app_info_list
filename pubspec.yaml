name: device_app_info_list
description: Flutter plugin with utility methods related to installed apps on device.
version: 1.0.0
homepage: https://github.com/ushodmonov/device_app_info_list

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=1.20.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: uz.ushodmonov.device_app_info_list
        pluginClass: InstalledAppsPlugin